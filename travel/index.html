<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aleo:wght@400;700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
    <title>Travel</title>
</head>
<body>
    <div class="header-promo-block">
        <img src="./header-background.png" alt="header background cover">
    <header class="header">
        <div class="container-wide">
            <div class="container">
            <div class="header-row">
                <div class="header-logo">
                    <img src="./header-logo.svg" alt="logo-image">
                </div>
                <nav class="header-nav">
                    <ul>
                        <li><a href="#">How It Works</a></li>
                        <li><a href="#">Plan Your Trip</a></li>
                        <li><a href="#">Destinations</a></li>
                        <li><a href="#">Travel Stories</a></li>
                    </ul>
                </nav>
                <div class="header-login"><a href="#" class="login-btn">Login</a></div>
            </div>
            </div>
        </div>
    </header>
    <main>
        <section class="Home">
            <div class="container">
                <div class="home-content">
                    <h1 class="home-heading">Explore the beauty of the World</h1>
                    <div class="home-text"><p>Receive personalized recommendations for countries, hotels, activities and more</p></div>
                    <div class="home-form">
                        <div class="home-row">
                        <input type="text" placeholder="What would you like to do?" class="home-input">
                        <div class="startPlanning-btn"><a href="#" class="startPlanning-btn">Start Planning</a></div>
                        </div>
                    </div>
                    </div>
                </div>
        </section>
    </main>
</div>
</body>
</html>
